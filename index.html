<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>SpendLens</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0e0c">

<!-- iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpendLens">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Header -->
<header class="header">
  <div class="logo">spend<span>lens</span></div>
  <input type="text" placeholder="Search offers..." id="search">
</header>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="offers">Offers</button>
  <button class="tab" data-tab="analyzer">Analyzer</button>
  <button class="tab" data-tab="tracker">Tracker</button>
</div>

<!-- Content -->
<main id="app">

  <!-- Offers -->
  <section class="view active" id="offers-view">
    <div id="offers-list"></div>
  </section>

  <!-- Analyzer -->
  <section class="view" id="analyzer-view">
    <div class="empty">
      Upload statements coming next…
    </div>
  </section>

  <!-- Tracker -->
  <section class="view" id="tracker-view">
    <div class="empty">
      Income vs expense dashboard coming next…
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
